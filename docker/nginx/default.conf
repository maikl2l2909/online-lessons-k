upstream php-fpm {
    server php:9000;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 2G;

    root /var/www/backend/public;

    # Laravel static assets (Filament, Livewire, Vite build)
    location ^~ /css/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location ^~ /js/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location ^~ /fonts/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    location ^~ /vendor/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location ^~ /build/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # Laravel API
    location ^~ /api/ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
    }

    # Filament admin
    location ^~ /admin {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Livewire (JS + update endpoints)
    location ^~ /livewire {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
    }

    location ^~ /sanctum {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Laravel public storage
    location /storage {
        alias /var/www/backend/storage/app/public;
    }

    # React SPA (production build)
    location / {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;
    }
}
